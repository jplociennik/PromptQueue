# Orkiestracja pełnego systemu: Postgres, Ollama (+ auto-pull modelu), Api, Worker, frontend.
# `docker compose up` stawia całość; porty i przebieg opisane w README.md.
services:
  postgres:
    image: postgres:18-alpine
    container_name: promptqueue-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-promptqueue}
    ports:
      - "5433:5432"
    volumes:
      # Mount na katalog nadrzędny (konwencja obrazu PostgreSQL 18+; działa też dla starszych majorów).
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-promptqueue}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    # Tag pinowany (nie 'latest') — powtarzalność środowiska. Model pobiera usługa ollama-pull.
    image: ollama/ollama:0.32.0
    container_name: promptqueue-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama-pull:
    image: ollama/ollama:0.32.0
    container_name: promptqueue-ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command: ["ollama pull ${OLLAMA_MODEL:-llama3.2}"]
    restart: "no"

  api:
    build:
      context: ./backend
      dockerfile: src/PromptQueue.Api/Dockerfile
    container_name: promptqueue-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__PromptQueue: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-promptqueue};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}"
    ports:
      - "5269:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  worker:
    build:
      context: ./backend
      dockerfile: src/PromptQueue.Worker/Dockerfile
    container_name: promptqueue-worker
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
    environment:
      DOTNET_ENVIRONMENT: Production
      ConnectionStrings__PromptQueue: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-promptqueue};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}"
      Worker__OllamaBaseUrl: http://ollama:11434
      Worker__OllamaModel: ${OLLAMA_MODEL:-llama3.2}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: promptqueue-frontend
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:80"

volumes:
  postgres-data:
  ollama-data:
