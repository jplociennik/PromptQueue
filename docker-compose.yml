# Orkiestracja developerska pq-1: tylko PostgreSQL. Pełny compose (Api, Worker, Ollama, frontend) domyka pq-6.
services:
  postgres:
    image: postgres:18-alpine
    container_name: promptqueue-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: promptqueue
    ports:
      - "5432:5432"
    volumes:
      # Mount na katalog nadrzędny (konwencja obrazu PostgreSQL 18+; działa też dla starszych majorów).
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d promptqueue"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
