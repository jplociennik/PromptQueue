# Orkiestracja developerska: PostgreSQL + Ollama (dla workera pq-3). Api/Worker/frontend jako serwisy domyka pq-6.
services:
  postgres:
    image: postgres:18-alpine
    container_name: promptqueue-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: promptqueue
    ports:
      - "5432:5432"
    volumes:
      # Mount na katalog nadrzędny (konwencja obrazu PostgreSQL 18+; działa też dla starszych majorów).
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d promptqueue"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    # Tag pinowany (nie 'latest') — powtarzalność środowiska. Model pobierany ręcznie:
    # docker compose exec ollama ollama pull llama3.2
    image: ollama/ollama:0.32.0
    container_name: promptqueue-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  ollama-data:
